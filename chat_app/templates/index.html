<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeonChat — Real-time Messenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --panel: #16161f;
    --border: #2a2a3d;
    --neon: #00f5d4;
    --neon2: #f72585;
    --neon3: #7209b7;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --online: #06ffa5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,245,212,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,212,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ========== JOIN SCREEN ========== */
  #join-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 0;
  }

  .join-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--neon);
    padding: 48px 56px;
    width: 420px;
    position: relative;
    animation: slideUp 0.5s ease;
  }

  .join-card::before {
    content: '';
    position: absolute;
    top: -2px; left: 40px; right: 40px;
    height: 2px;
    background: var(--neon);
    box-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    margin-bottom: 40px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--neon);
    text-shadow: 0 0 20px var(--neon);
    letter-spacing: -1px;
  }

  .logo span { color: var(--neon2); }

  .logo-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
    font-family: 'Space Mono', monospace;
  }

  .field-group {
    margin-bottom: 20px;
  }

  .field-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 8px;
    display: block;
  }

  .field-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 16px;
    font-size: 15px;
    font-family: 'Syne', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field-input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 0 2px rgba(0,245,212,0.1), inset 0 0 20px rgba(0,245,212,0.03);
  }

  .field-input::placeholder { color: var(--muted); }

  .rooms-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }

  .room-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .room-btn:hover, .room-btn.active {
    border-color: var(--neon);
    color: var(--neon);
    box-shadow: 0 0 10px rgba(0,245,212,0.1);
  }

  .join-btn {
    width: 100%;
    background: var(--neon);
    color: var(--bg);
    border: none;
    padding: 16px;
    font-size: 14px;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 32px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .join-btn:hover {
    box-shadow: 0 0 30px rgba(0,245,212,0.5);
    transform: translateY(-1px);
  }

  .join-btn:active { transform: translateY(0); }

  /* ========== CHAT APP ========== */
  #chat-app {
    display: none;
    flex-direction: row;
    height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .app-logo {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--neon);
    text-shadow: 0 0 15px rgba(0,245,212,0.5);
  }

  .app-logo span { color: var(--neon2); }

  .room-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 8px;
  }

  .room-dot {
    width: 6px; height: 6px;
    background: var(--online);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--online);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .section-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    padding: 20px 20px 8px;
  }

  .users-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px;
  }

  .users-list::-webkit-scrollbar { width: 3px; }
  .users-list::-webkit-scrollbar-track { background: transparent; }
  .users-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .user-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 8px;
    border-radius: 2px;
    transition: background 0.15s;
  }

  .user-item:hover { background: rgba(255,255,255,0.03); }

  .user-avatar {
    width: 28px; height: 28px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    flex-shrink: 0;
  }

  .user-name {
    font-size: 13px;
    color: var(--text);
    font-weight: 600;
  }

  .you-badge {
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    color: var(--neon);
    border: 1px solid var(--neon);
    padding: 1px 4px;
    letter-spacing: 1px;
    opacity: 0.7;
  }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Main chat */
  .chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .chat-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    flex-shrink: 0;
  }

  .chat-header-info {}

  .chat-room-name {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.5px;
  }

  .chat-room-name .hash {
    color: var(--neon);
    font-family: 'Space Mono', monospace;
    margin-right: 2px;
  }

  .online-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    margin-top: 4px;
  }

  .online-count {
    color: var(--online);
    font-weight: 700;
  }

  /* Messages */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    padding: 6px 10px;
    border-radius: 2px;
    transition: background 0.15s;
    animation: msgIn 0.2s ease;
    align-items: flex-start;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .msg:hover { background: rgba(255,255,255,0.02); }

  .msg.own { flex-direction: row-reverse; }
  .msg.own:hover { background: rgba(0,245,212,0.03); }

  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-content { flex: 1; min-width: 0; max-width: 75%; }

  .msg.own .msg-content { align-items: flex-end; display: flex; flex-direction: column; }

  .msg-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }

  .msg.own .msg-header { flex-direction: row-reverse; }

  .msg-user {
    font-size: 12px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
  }

  .msg-time {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    border-left: 2px solid transparent;
    word-break: break-word;
  }

  .msg.own .msg-bubble {
    background: rgba(0,245,212,0.07);
    border-color: rgba(0,245,212,0.2);
    border-left: none;
    border-right: 2px solid var(--neon);
    box-shadow: 0 0 15px rgba(0,245,212,0.05);
  }

  /* System messages */
  .sys-msg {
    text-align: center;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    padding: 8px 0;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: msgIn 0.3s ease;
  }

  .sys-msg::before, .sys-msg::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Typing indicator */
  .typing-indicator {
    padding: 8px 38px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    height: 28px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .typing-dots {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .typing-dots span {
    width: 4px; height: 4px;
    background: var(--neon);
    border-radius: 50%;
    animation: typingPulse 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingPulse {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 4px 4px 4px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--neon);
    box-shadow: 0 0 0 2px rgba(0,245,212,0.08);
  }

  .msg-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'Syne', sans-serif;
    outline: none;
    padding: 8px 0;
  }

  .msg-input::placeholder { color: var(--muted); }

  .send-btn {
    background: var(--neon);
    color: var(--bg);
    border: none;
    width: 42px; height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover {
    box-shadow: 0 0 20px rgba(0,245,212,0.5);
  }

  .send-btn:active { transform: scale(0.95); }

  .char-count {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    padding: 4px 0 0 4px;
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    gap: 12px;
    text-align: center;
  }

  .empty-icon {
    font-size: 32px;
    opacity: 0.3;
  }

  /* Notification toast */
  .toast {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--neon);
    padding: 12px 16px;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    color: var(--text);
    animation: toastIn 0.3s ease;
    z-index: 999;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @media (max-width: 600px) {
    .sidebar { display: none; }
    .join-card { width: 92vw; padding: 32px 24px; }
    .chat-header { padding: 16px 16px; }
    .messages-area { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
  }
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="join-screen">
  <div class="join-card">
    <div class="logo-area">
      <div class="logo">Neon<span>Chat</span></div>
      <div class="logo-sub">Real-time messenger</div>
    </div>

    <div class="field-group">
      <label class="field-label">Your Name</label>
      <input class="field-input" id="username-input" type="text" placeholder="Enter username..." maxlength="20">
    </div>

    <div class="field-group">
      <label class="field-label">Choose Room</label>
      <div class="rooms-grid">
        <button class="room-btn active" data-room="general"># general</button>
        <button class="room-btn" data-room="tech"># tech</button>
        <button class="room-btn" data-room="random"># random</button>
        <button class="room-btn" data-room="hindi"># hindi</button>
      </div>
    </div>

    <button class="join-btn" id="join-btn">JOIN CHAT →</button>
  </div>
</div>

<!-- CHAT APP -->
<div id="chat-app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="app-logo">Neon<span>Chat</span></div>
      <div class="room-tag">
        <span class="room-dot"></span>
        <span id="sidebar-room">general</span>
      </div>
    </div>
    <div class="section-title">Online Members</div>
    <div class="users-list" id="users-list"></div>
    <div class="sidebar-footer">
      <span class="room-dot" style="width:8px;height:8px;background:var(--online);border-radius:50%;"></span>
      <span id="online-count-sidebar">0 online</span>
    </div>
  </aside>

  <div class="chat-main">
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="chat-room-name">
          <span class="hash">#</span><span id="header-room">general</span>
        </div>
        <div class="online-indicator">
          <span class="online-count" id="online-count">0</span> online
        </div>
      </div>
    </div>

    <div class="messages-area" id="messages-area">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">💬</div>
        <div>Koi message nahi hai abhi</div>
        <div style="font-size:11px;opacity:0.5">Pehla message bhejne wale bano!</div>
      </div>
    </div>

    <div class="typing-indicator" id="typing-indicator"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <input class="msg-input" id="msg-input" type="text" placeholder="Message likhein..." maxlength="500">
        <button class="send-btn" id="send-btn">➤</button>
      </div>
      <div class="char-count" id="char-count">0 / 500</div>
    </div>
  </div>
</div>

<script>
const socket = io();
let myUsername = '';
let myRoom = 'general';
let mySid = null;
let typingTimer = null;
let isTyping = false;
let typingUsers = new Set();
let messageCount = 0;

// Room selection
document.querySelectorAll('.room-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    myRoom = btn.dataset.room;
  });
});

// Join
document.getElementById('join-btn').addEventListener('click', joinChat);
document.getElementById('username-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') joinChat();
});

function joinChat() {
  const name = document.getElementById('username-input').value.trim();
  if (!name) {
    document.getElementById('username-input').focus();
    document.getElementById('username-input').style.borderColor = 'var(--neon2)';
    setTimeout(() => document.getElementById('username-input').style.borderColor = '', 800);
    return;
  }
  myUsername = name;
  socket.emit('join', { username: name, room: myRoom });
  document.getElementById('join-screen').style.display = 'none';
  document.getElementById('chat-app').style.display = 'flex';
  document.getElementById('sidebar-room').textContent = myRoom;
  document.getElementById('header-room').textContent = myRoom;
  document.getElementById('msg-input').focus();
}

// Send message
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('message', { text });
  input.value = '';
  document.getElementById('char-count').textContent = '0 / 500';
  clearTyping();
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') sendMessage();
});

// Typing
document.getElementById('msg-input').addEventListener('input', e => {
  document.getElementById('char-count').textContent = `${e.target.value.length} / 500`;
  if (!isTyping) {
    isTyping = true;
    socket.emit('typing', { is_typing: true });
  }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(clearTyping, 1500);
});

function clearTyping() {
  if (isTyping) {
    isTyping = false;
    socket.emit('typing', { is_typing: false });
  }
}

// Socket events
socket.on('message', data => {
  hideEmpty();
  const isOwn = (data.username === myUsername);
  const area = document.getElementById('messages-area');
  const div = document.createElement('div');
  div.className = `msg${isOwn ? ' own' : ''}`;
  div.innerHTML = `
    <div class="msg-avatar" style="background:${data.color}22;color:${data.color};border:1px solid ${data.color}44;">
      ${data.username.charAt(0).toUpperCase()}
    </div>
    <div class="msg-content">
      <div class="msg-header">
        <span class="msg-user" style="color:${data.color}">${escapeHtml(data.username)}</span>
        <span class="msg-time">${data.time}</span>
      </div>
      <div class="msg-bubble" style="${!isOwn ? `border-left-color:${data.color}` : ''}">${escapeHtml(data.text)}</div>
    </div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  messageCount++;
});

socket.on('user_joined', data => {
  hideEmpty();
  addSystemMsg(`✦ ${data.username} join ho gaya`, '#00f5d4');
  updateOnlineCount(data.online_count);
  showToast(`${data.username} join hua!`);
});

socket.on('user_left', data => {
  addSystemMsg(`✦ ${data.username} chala gaya`, '#f72585');
  updateOnlineCount(data.online_count);
});

socket.on('user_list', data => {
  const list = document.getElementById('users-list');
  list.innerHTML = '';
  data.users.forEach(u => {
    const item = document.createElement('div');
    item.className = 'user-item';
    const isMe = u.username === myUsername;
    item.innerHTML = `
      <div class="user-avatar" style="background:${u.color}22;color:${u.color};border:1px solid ${u.color}44;">
        ${u.username.charAt(0).toUpperCase()}
      </div>
      <span class="user-name">${escapeHtml(u.username)}</span>
      ${isMe ? '<span class="you-badge">YOU</span>' : ''}
    `;
    list.appendChild(item);
  });
  updateOnlineCount(data.users.length);
});

socket.on('typing', data => {
  if (data.is_typing) {
    typingUsers.add(data.username);
  } else {
    typingUsers.delete(data.username);
  }
  updateTyping();
});

function updateTyping() {
  const el = document.getElementById('typing-indicator');
  if (typingUsers.size === 0) {
    el.innerHTML = '';
    return;
  }
  const names = [...typingUsers].join(', ');
  el.innerHTML = `
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span>${escapeHtml(names)} likh raha hai...</span>
  `;
}

function addSystemMsg(text, color) {
  const area = document.getElementById('messages-area');
  const div = document.createElement('div');
  div.className = 'sys-msg';
  div.style.color = color || 'var(--muted)';
  div.textContent = text;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function updateOnlineCount(count) {
  document.getElementById('online-count').textContent = count;
  document.getElementById('online-count-sidebar').textContent = `${count} online`;
}

function hideEmpty() {
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(text));
  return d.innerHTML;
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
</script>
</body>
</html>
